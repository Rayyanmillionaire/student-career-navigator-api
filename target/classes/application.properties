# ============================================================
# Student Career Navigator API — Application Properties
# ============================================================

spring.application.name=student-career-navigator-api
server.port=8080

# ============================================================
# DATABASE — H2 In-Memory (works out of the box, no install needed)
# ============================================================
spring.datasource.url=jdbc:h2:mem:scndb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ============================================================
# DATABASE — MySQL (uncomment this block when ready for production)
# ============================================================
# spring.datasource.url=jdbc:mysql://localhost:3306/scn_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=root
# spring.datasource.password=your_mysql_password
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================================
# JPA / HIBERNATE
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JWT
# ============================================================
app.jwt.secret=your-super-secret-jwt-key-change-this-in-production-minimum-256-bits
app.jwt.expiration=86400000

# ============================================================
# CORS — Allow requests from the frontend
# ============================================================
app.cors.allowed-origins=http://localhost:8081,https://student-career-navigator.vercel.app
